name: 毎日コンテンツ自動生成

on:
  schedule:
    # 毎日午前0時（JST）= 15:00 UTC
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: コラム記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: ランキングページを生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-ranking.mjs

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ rankings/
          if git diff --cached --quiet; then
            echo "新しいコンテンツはありませんでした"
          else
            git commit -m "auto: コンテンツを追加 $(date '+%Y-%m-%d')"
            git push
          fi
